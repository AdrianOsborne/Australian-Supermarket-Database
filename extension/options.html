<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Extension Settings</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; max-width: 720px; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input, textarea { width: 100%; box-sizing: border-box; margin-top: 6px; padding: 8px; }
    button { margin-top: 16px; padding: 10px 14px; }
    pre { background: #f3f3f3; padding: 10px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Australian Supermarket Database Settings</h1>

  <label for="githubToken">GitHub token</label>
  <input id="githubToken" type="password" placeholder="GitHub personal access token">

  <label for="repoOwner">Private repo owner</label>
  <input id="repoOwner" type="text" value="AdrianOsborne">

  <label for="repoName">Private repo name</label>
  <input id="repoName" type="text" value="AU-Supermarket-Backend">

  <button id="saveBtn">Save settings</button>
  <pre id="status"></pre>

  <script src="options.js"></script>
</body>
</html>
